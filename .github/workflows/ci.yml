# ci.yml — MediVoice VN CI/CD Pipeline
# Học từ MediVoice_AI ci.yml
# ISO/IEC 42001:2023 Clause 9.1 + ISO/IEC 12207:2017 Cl.8.3
# Triggers: push + pull_request to master

name: MediVoice VN CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  quality-gate:
    name: Quality Gate (ISO/IEC 42001 Cl.9.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit mypy pytest-cov

      - name: KPI-012 — Pipeline + Compliance tests (fast, no ML models)
        run: python -m pytest tests/ -v --tb=short -q --ignore=tests/integration
        timeout-minutes: 5

      - name: KPI-COVERAGE — Line coverage >= 80%
        run: python -m pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80 --ignore=tests/integration
        timeout-minutes: 5

      - name: SECURITY — bandit scan (HIGH + MEDIUM)
        run: bandit -r src/ -ll -q
        timeout-minutes: 2

      - name: TYPES — mypy check
        run: mypy src/ --ignore-missing-imports --python-version 3.10 --no-error-summary
        timeout-minutes: 3
        continue-on-error: true  # Phase 0: type errors không block, chỉ report
